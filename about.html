<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="帛瑀室內設計 - 關於我們 | 設計理念與總監介紹">
    <title>ABOUT | 帛瑀室內設計 Silky Jade</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="about-page">

    <!-- ========== Header (沿用首頁，深色版素材) ========== -->
    <header>
        <a href="index.html" class="logo-link">
            <img decoding="async" src="about_png/ABOUT_LOGO-B-t.webp" alt="帛瑀 Silky Jade LOGO">
        </a>
        <nav class="main-nav">
            <a href="index.html"><img decoding="async" src="about_png/ABOUT_HOME-B-t.webp" alt="HOME"></a>
            <a href="about.html"><img decoding="async" src="about_png/ABOUT_ABOUT-B-t.webp" alt="ABOUT"></a>
            <a href="projects.html"><img decoding="async" src="about_png/ABOUT_PROJECTS-B-t.webp" alt="PROJECTS"></a>
            <a href="contact.html"><img decoding="async" src="about_png/ABOUT_CONTACT-B-t.webp" alt="CONTACT"></a>
            <a href="services.html"><img decoding="async" src="about_png/ABOUT_SERVICES-B-t.webp" alt="SERVICES"></a>
        </nav>
        <!-- Hamburger (Mobile Only) -->
        <button class="mobile-menu-toggle" aria-label="選單"><span></span><span></span><span></span></button>

        <a href="https://www.instagram.com/silkyjade2023?igsh=Z3oxdTZscGZrMTJu&utm_source=qr" target="_blank" class="ig-link" aria-label="Instagram">
            <img decoding="async" src="about_png/ABOUT_IGICON-B.webp" alt="Instagram">
        </a>
    </header>

    <!-- ========== Main Content ========== -->
    <main>

        <!-- ▍Section 1: OUR CONCEPT -->
        <section class="about-section concept-section">
            <div class="row">
                <!-- 左欄：抽屜圖片 + 文字 -->
                <div class="col-left concept-left">
                    <div class="concept-img-wrapper">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_image-2.webp" alt="拉開抽屜" class="concept-drawer-img">
                        <!-- ::before pseudo 產生錯位色塊 (CSS) -->
                    </div>
                    <div class="concept-text">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_OUR CONCEPT-B-t.webp" alt="OUR CONCEPT" class="section-title-img fade-in">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_t-1.webp" alt="每一個案子都是一次夢想的實現" class="section-text-img fade-in" style="transition-delay: 0.4s">
                    </div>
                </div>
                <!-- 右欄：圓桌大圖 -->
                <div class="col-right concept-right">
                    <img loading="lazy" decoding="async" src="about_png/ABOUT_image-1.webp" alt="圓桌與石材桌腳" class="concept-table-img">
                </div>
            </div>
        </section>

        <!-- ▍Section 2: COMFORTABLE THOUGHTFUL TOUCHING -->
        <section class="about-section touching-section">
            <div class="row">
                <div class="col-left touching-left">
                    <div class="touching-arch-wrapper">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_color%20block-2%23BA9F89.webp" alt="" class="touching-color-block">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_image-3.webp" alt="拱門木作櫃" class="touching-arch-img">
                    </div>
                </div>
                <div class="col-right touching-right">
                    <div class="touching-content-wrapper">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_image-4.webp" alt="床頭盆栽" class="touching-plant-img">
                        <div>
                            <img loading="lazy" decoding="async" src="about_png/ABOUT_t-2.webp" alt="美感與生活並重" class="section-text-img fade-in">
                            <img loading="lazy" decoding="async" src="about_png/ABOUT_COMFORTABLE-B-t.webp" alt="COMFORTABLE THOUGHTFUL TOUCHING"
                                class="section-title-img comfortable-title-img fade-in" style="transition-delay: 0.4s">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ▍Section 3: HERE -->
        <section class="about-section here-section">
            <div class="row">
                <div class="col-left here-left">
                    <!-- 裝飾弧線 (左上方) -->
                    <div class="here-text">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_HERE-B-t.webp" alt="HERE" class="section-title-img here-title-img fade-in">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_t-3.webp" alt="這裡，每個點子都能發光" class="section-text-img fade-in" style="transition-delay: 0.4s">
                    </div>
                </div>
                <div class="col-right here-right">
                    <div class="here-img-wrapper">
                        <img loading="lazy" decoding="async" src="about_png/ABOUT_image-5.webp" alt="米白造型沙發" class="here-sofa-img">
                        <!-- ::before pseudo 產生錯位色塊 (CSS) -->
                    </div>
                </div>
            </div>
        </section>

        <!-- ▍Section 4: INTRODUCTION -->
        <section class="section-intro">
            <!-- 背景大圖：用 <img> 撐開真實高度，不裁切 -->
            <img loading="lazy" decoding="async" src="about_png/ABOUT_image-6.webp" alt="" class="intro-bg-img">
            <!-- 左覆蓋層：絕對定位，疊上 INTRODUCTION 文字 + 簽名 -->
            <div class="intro-left-overlay">
                <img loading="lazy" decoding="async" src="about_png/ABOUT_INTRODUCTION-B-t.webp" alt="INTRODUCTION" class="img-vertical-text fade-in">
                <img loading="lazy" decoding="async" src="Aria簽名_斜體 複本.webp" alt="Aria Tseng Signature" class="img-signature-side fade-in" style="transition-delay: 0.5s">
            </div>
            <!-- 右欄：文字圖片 -->
            <div class="intro-right">
                <img loading="lazy" decoding="async" src="about_png/ABOUT_THE CONCEPT-B-t.webp" alt="THE CONCEPT AND SOUL ARE IRREPLACEABLE"
                    class="img-eng-quote fade-in">
                <img loading="lazy" decoding="async" src="about_png/ABOUT_t-4.webp" alt="「概念及靈魂是無法被複製的」" class="img-zh-quote fade-in" style="transition-delay: 0.35s">
                <div class="director-row fade-in" style="transition-delay: 0.6s">
                    <img loading="lazy" decoding="async" src="about_png/ABOUT_t-5.webp" alt="設計總監" class="img-director-title">
                    <img loading="lazy" decoding="async" src="about_png/ABOUT_Aria Tseng-B-t.webp" alt="Aria Tseng" class="img-aria-name">
                </div>
                <img loading="lazy" decoding="async" src="about_png/ABOUT_t-6.webp" alt="設計總監介紹" class="img-director-desc fade-in" style="transition-delay: 0.85s">
            </div>
        </section>

    </main>

    <!-- ========== Footer (全新設計) ========== -->
    <footer class="site-footer fade-in-up">
        <div class="footer-left">
            <img loading="lazy" decoding="async" src="about_png/ABOUT_LOGO.webp" alt="帛瑀 Silky Jade">

                <a href="contact.html"><img loading="lazy" decoding="async" src="about_png/ABOUT_CONTACT-t.webp" alt="CONTACT"></a>
                <a href="services.html"><img loading="lazy" decoding="async" src="about_png/ABOUT_SERVICES-t.webp" alt="SERVICES"></a>
            </nav>
        </div>
        <div class="footer-right">
            <img loading="lazy" decoding="async" src="about_png/ABOUT_@2026-t.webp" alt="© 2026 SILKY JADE. ALL RIGHTS RESERVED.">
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
